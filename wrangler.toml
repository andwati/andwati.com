name = "andwati-com"
compatibility_date = "2026-07-16"

[assets]
directory = "./public"
not_found_handling = "404-page"

[[routes]]
pattern = "andwati.com"
custom_domain = true

[[routes]]
pattern = "www.andwati.com"
custom_domain = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
