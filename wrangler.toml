name = "andwati-com"
compatibility_date = "2026-04-2"
compatibility_flags = ["nodejs_compat"]

[build]
command = "./build.sh"

[assets]
directory = "./public"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
