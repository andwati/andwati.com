base_url = "https://andwati.com"
title = "Thoughts and Musings"
description = "Hacking the Narrative, One Byte at a Time."
compile_sass = true
minify_html = true
build_search_index = true
taxonomies = [{ name = "tags" }]
generate_feeds = true
feed_filenames = ["rss.xml", "feed.json"]
generate_robots_txt = true

[markdown]
external_links_target_blank = true
external_links_no_referrer = true
lazy_async_image = true

[markdown.highlighting]
theme = "gruvbox-dark-medium"

[extra]
# Analytics
google_analytics = "G-4HGRQ9QNPD"
google_site_verification = ""

# Author Information
author = "andwati"
copyright_start_year = 2021

# Profile Section (Homepage)
show_profile = true
profile_subtitle = "offending binaries"

# Social Links
github_url = "https://github.com/andwati"
twitter_url = "https://twitter.com/andwati_"
youtube_url = "https://www.youtube.com/@pwnforfunandprofit"
linkedin_url = ""
email = "andwatiian@gmail.com"

# Comments (Utterances)
enable_comments = true
utterances_repo = "andwati/andwati.com"
utterances_theme = "gruvbox-dark"
utterances_theme_light = "github-light"

# Navigation Menu
[[extra.menu]]
name = "About"
url = "/about/"
match = "/about"
[[extra.menu]]
name = "Posts"
url = "/posts"
match = "/posts"
[[extra.menu]]
name = "Tags"
url = "/tags/"
match = "/tags"
[[extra.menu]]
name = "Archive"
url = "@/archive/_index.md"
match = "/archive"

# Features
enable_search = true
enable_theme_toggle = true
show_rss_link = true

# Social meta
twitter_handle = "@andwati_"

# Homepage
homepage_post_limit = 3
homepage_feed_heading = "Latest"
view_all_posts_label = "View all posts"

# Related posts
related_posts_limit = 3
related_posts_title = "Related Posts"

# Search
search_placeholder = "Search posts..."

# Page copy
posts_page_title = "Posts"
posts_page_subtitle = "Exploring binary exploitation, reverse engineering, and offensive security."
archive_page_title = "Archive"
tags_page_title = "All Tags"
toc_title = "Table of Contents"
toc_sidebar_title = "Contents"
series_label = "Series"
post_nav_prev_label = "Previous"
post_nav_next_label = "Next"
share_label = "Share:"

# 404 page
notfound_status = "Status: Not Found"
notfound_title = "Document Not Found"
notfound_body = "This page couldn't be located in the archive. It may have been moved, renamed, or never filed."
