<div class="youtube-wrapper">
    <iframe
        src="https://www.youtube-nocookie.com/embed/{{ id }}{% if autoplay %}?autoplay=1{% endif %}"
        {% if title %}title="{{ title }}"{% endif %}
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>
</div>
<!-- SEO: VideoObject JSON-LD (confirms this page hosts the embedded video) -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoObject",
  "name": {{ title | default(value=page.title) | json_encode | safe }},
  "description": {{ page.description | default(value=config.description) | json_encode | safe }},
  "thumbnailUrl": "https://i.ytimg.com/vi/{{ id | safe }}/sddefault.jpg"
  {% if page.date %},"uploadDate": "{{ page.date | date(format="%+") }}"{% endif %},
  "embedUrl": "https://www.youtube-nocookie.com/embed/{{ id | safe }}",
  "contentUrl": "https://www.youtube.com/watch?v={{ id | safe }}"
}
</script>
